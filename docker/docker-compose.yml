services:
  karing:
    image: ghcr.io/recelsus/karing:latest
    # Build locally instead of pulling from GHCR (uncomment below)
    # build:
    #   context: ..
    #   dockerfile: docker/Dockerfile
    container_name: karing
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Defaults are baked in the image; override by uncommenting values below.
      # KARING_CONFIG: "/etc/karing/karing.json"
      # KARING_DATA: "/var/lib/karing/karing.db"
      # KARING_LOG_PATH: "/var/log/karing"
      # KARING_BASE_PATH: /myapp
      # KARING_LIMIT: "100"
      # KARING_TRUSTED_PROXY: "1"
      # KARING_NO_AUTH: "1"
      KARING_WEB_UI: "1"
    volumes:
      - karing-data:/var/lib/karing   # data dir
      - karing-logs:/var/log/karing   # logs dir

volumes:
  karing-data:
  karing-logs:
