services:
  karing:
    image: ghcr.io/recelsus/karing:latest
    # Build locally instead of pulling from GHCR (uncomment below)
    # build:
    #   context: ..
    #   dockerfile: docker/Dockerfile
    container_name: karing
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      KARING_DB_PATH: "/var/lib/karing/karing.sqlite"
      KARING_UPLOAD_PATH: "/var/lib/karing/uploads"
      KARING_LOG_PATH: "/var/log/karing"
      # KARING_BASE_PATH: /myapp
      # KARING_LIMIT: "100"
      # KARING_MAX_FILE: "20"
      # KARING_MAX_TEXT: "5"
    volumes:
      - karing-data:/var/lib/karing
      - karing-logs:/var/log/karing

volumes:
  karing-data:
  karing-logs:
