name: cli

on:
  push:
    branches: [ master ]
    paths:
      - 'cli/**'
      - 'server/version.h'
      - 'CMakeLists.txt'
      - '.github/workflows/build.yml'
  workflow_dispatch: {}

jobs:
  linux-cli:
    runs-on: ubuntu-latest
    container: drogonframework/drogon:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          apt-get update
          apt-get install -y cmake ninja-build git pkg-config libcurl4-openssl-dev libjsoncpp-dev
      - name: Configure
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DKARING_BUILD_SERVER=OFF \
            -DKARING_BUILD_CLI=ON
      - name: Build
        run: cmake --build build -j
      - name: Package artifact
        run: |
          mkdir -p dist/linux
          cp build/cli/karing dist/linux/karing-cli-linux
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: karing-cli-linux
          path: dist/linux

  macos-cli:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: |
          brew install curl jsoncpp pkg-config
      - name: Configure
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DKARING_BUILD_SERVER=OFF \
            -DKARING_BUILD_CLI=ON
      - name: Build
        run: cmake --build build -j
      - name: Package artifact
        run: |
          mkdir -p dist/macos
          cp build/cli/karing dist/macos/karing-cli-macos
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: karing-cli-macos
          path: dist/macos
